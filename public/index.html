<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Bot 🅿️</title>
  <style>
    :root {
      --bg: #f4f4f5;
      --card: #ffffff;
      --border: #e4e4e7;
      --text: #18181b;
      --muted: #71717a;
      --accent: #3b82f6;
      --danger: #ef4444;
      --selected-bg: #eff6ff;
      --selected-border: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
    }

    header h1 { font-size: 20px; font-weight: 700; }
    header p  { font-size: 13px; color: var(--muted); margin-top: 3px; }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    /* ── Profile Cards ───────────────────────────────── */
    .profile-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

    .profile-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .profile-card:hover { border-color: var(--accent); }

    .profile-card.selected {
      border-color: var(--selected-border);
      background: var(--selected-bg);
    }

    .profile-info h3 { font-size: 15px; font-weight: 600; }
    .profile-info p  { font-size: 13px; color: var(--muted); margin-top: 1px; }

    .card-btns { display: flex; gap: 6px; flex-shrink: 0; }

    .btn-sm {
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }

    .btn-sm:hover { background: #fff; border-color: #aaa; color: var(--text); }
    .btn-sm.del:hover { background: #fef2f2; border-color: var(--danger); color: var(--danger); }

    .empty-state {
      text-align: center;
      padding: 36px;
      color: var(--muted);
      font-size: 14px;
    }

    .add-btn {
      width: 100%;
      padding: 11px;
      border: 2px dashed var(--border);
      background: transparent;
      border-radius: 10px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }

    .add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--selected-bg);
    }

    /* ── Selected Profile Summary ─────────────────────── */
    .summary {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--bg);
    }

    .summary-row:last-child { border-bottom: none; }
    .summary-row .key { color: var(--muted); font-size: 12px; }
    .summary-row .val { font-weight: 500; }

    /* ── Action Section ───────────────────────────────── */
    .action-section { margin-top: 32px; }

    .park-btn {
      width: 100%;
      padding: 20px;
      background: #18181b;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.12s;
    }

    .park-btn:hover { background: #000; transform: scale(1.01); }
    .park-btn:active { transform: scale(0.98); }
    .park-btn:disabled { background: #a1a1aa; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
      text-align: center;
    }

    .status.ok  { color: #16a34a; }
    .status.err { color: var(--danger); }

    /* ── Modal ────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .overlay.show { display: flex; }

    .modal {
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 460px;
      margin: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      color: var(--text);
      background: #fff;
      transition: border-color 0.12s;
    }

    .form-group input:focus { border-color: var(--accent); }

    .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .btn-cancel {
      padding: 10px 20px;
      border: 1.5px solid var(--border);
      background: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-save {
      padding: 10px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s;
    }

    .btn-save:hover { background: #2563eb; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>🅿️ Parking Bot</h1>
  <p>Auto-fill your offstreet.io parking registration in one click.</p>
</header>

<div class="container">
  <p class="section-label">Profiles</p>
  <div class="profile-list" id="profile-list"></div>
  <button class="add-btn" onclick="openModal()">+ Add New Profile</button>

  <div id="action-section" style="display:none">
    <hr class="divider">
    <p class="section-label">Selected</p>
    <div class="summary" id="summary"></div>
    <button class="park-btn" id="park-btn" onclick="parkIt()">
      YEET ME INTO A PARKING SPOT 🚀
    </button>
    <p class="status" id="status"></p>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <h2 id="modal-title">Add Profile</h2>

    <div class="form-group">
      <label>Profile Nickname</label>
      <input type="text" id="f-name" placeholder="e.g. John's Car">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="f-first" placeholder="John">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="f-last" placeholder="Doe">
      </div>
    </div>

    <div class="form-group">
      <label>License Plate</label>
      <input type="text" id="f-plate" placeholder="ABC1234">
    </div>

    <div class="form-group">
      <label>Volunteer PIN / Code</label>
      <input type="text" id="f-pin" placeholder="12345">
      <p class="hint">Used for both the "Code" step and the "Volunteer PIN" step on the parking form.</p>
    </div>

    <div class="form-group">
      <label>Email <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <input type="email" id="f-email" placeholder="john@example.com">
      <p class="hint">For parking confirmation email.</p>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveProfile()">Save Profile</button>
    </div>
  </div>
</div>

<script>
  let profiles = JSON.parse(localStorage.getItem('pp_profiles') || '[]');
  let selectedId = localStorage.getItem('pp_selected') || null;
  let editingId  = null;

  function persist() {
    localStorage.setItem('pp_profiles', JSON.stringify(profiles));
    localStorage.setItem('pp_selected', selectedId || '');
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function render() {
    const list = document.getElementById('profile-list');

    if (!profiles.length) {
      list.innerHTML = '<div class="empty-state">No profiles yet. Click "+ Add New Profile" to get started.</div>';
    } else {
      list.innerHTML = profiles.map(p => `
        <div class="profile-card ${p.id === selectedId ? 'selected' : ''}" onclick="select('${p.id}')">
          <div class="profile-info">
            <h3>${esc(p.name)}</h3>
            <p>${esc(p.firstName)} ${esc(p.lastName)} · ${esc(p.licensePlate)}</p>
          </div>
          <div class="card-btns" onclick="event.stopPropagation()">
            <button class="btn-sm" onclick="openModal('${p.id}')">Edit</button>
            <button class="btn-sm del" onclick="del('${p.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    const p = profiles.find(x => x.id === selectedId);
    const sec = document.getElementById('action-section');

    if (p) {
      sec.style.display = 'block';
      document.getElementById('summary').innerHTML = [
        ['Name',          `${esc(p.firstName)} ${esc(p.lastName)}`],
        ['License Plate', esc(p.licensePlate)],
        ['Volunteer PIN', esc(p.volunteerPin)],
        ['Email',         esc(p.email || '—')],
      ].map(([k, v]) => `
        <div class="summary-row">
          <span class="key">${k}</span>
          <span class="val">${v}</span>
        </div>
      `).join('');
    } else {
      sec.style.display = 'none';
    }
  }

  function select(id) {
    selectedId = id;
    document.getElementById('status').textContent = '';
    document.getElementById('status').className = 'status';
    persist();
    render();
  }

  function del(id) {
    if (!confirm('Delete this profile?')) return;
    profiles = profiles.filter(p => p.id !== id);
    if (selectedId === id) selectedId = null;
    persist();
    render();
  }

  function openModal(id = null) {
    editingId = id;
    document.getElementById('modal-title').textContent = id ? 'Edit Profile' : 'Add Profile';

    if (id) {
      const p = profiles.find(x => x.id === id);
      document.getElementById('f-name').value  = p.name;
      document.getElementById('f-first').value = p.firstName;
      document.getElementById('f-last').value  = p.lastName;
      document.getElementById('f-plate').value = p.licensePlate;
      document.getElementById('f-pin').value   = p.volunteerPin;
      document.getElementById('f-email').value = p.email || '';
    } else {
      ['f-name','f-first','f-last','f-plate','f-pin','f-email'].forEach(id => {
        document.getElementById(id).value = '';
      });
    }

    document.getElementById('overlay').classList.add('show');
    document.getElementById('f-name').focus();
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('show');
    editingId = null;
  }

  function overlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  function saveProfile() {
    const name        = document.getElementById('f-name').value.trim();
    const firstName   = document.getElementById('f-first').value.trim();
    const lastName    = document.getElementById('f-last').value.trim();
    const licensePlate = document.getElementById('f-plate').value.trim().toUpperCase();
    const volunteerPin = document.getElementById('f-pin').value.trim();
    const email       = document.getElementById('f-email').value.trim();

    if (!name || !firstName || !lastName || !licensePlate || !volunteerPin) {
      alert('Please fill out all required fields.');
      return;
    }

    if (editingId) {
      const idx = profiles.findIndex(p => p.id === editingId);
      profiles[idx] = { ...profiles[idx], name, firstName, lastName, licensePlate, volunteerPin, email };
    } else {
      profiles.push({ id: Date.now().toString(), name, firstName, lastName, licensePlate, volunteerPin, email });
    }

    persist();
    closeModal();
    render();
  }

  async function parkIt() {
    const profile = profiles.find(p => p.id === selectedId);
    if (!profile) return;

    const btn    = document.getElementById('park-btn');
    const status = document.getElementById('status');

    btn.disabled = true;
    btn.textContent = 'LAUNCHING ROBOT... 🤖';
    status.textContent = '';
    status.className = 'status';

    try {
      const res  = await fetch('/automate', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(profile),
      });
      const data = await res.json();

      if (data.ok) {
        status.textContent = '✅ Bot launched! Watch the browser window that just opened.';
        status.className = 'status ok';
      } else {
        status.textContent = '❌ ' + (data.error || 'Something went wrong. Check the terminal.');
        status.className = 'status err';
      }
    } catch {
      status.textContent = '❌ Cannot reach the server. Make sure it\'s running (npm start).';
      status.className = 'status err';
    }

    btn.disabled = false;
    btn.textContent = 'YEET ME INTO A PARKING SPOT 🚀';
  }

  // Keyboard shortcut: Escape closes modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  render();
</script>

</body>
</html>
